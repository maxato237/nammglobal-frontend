<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte – NAMM GLOBAL</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{red:'#D62828',gold:'#E8A020',dark:'#1A1A2E'}}}}}</script>
  <style>
    .auth-bg {
      background: linear-gradient(135deg,#1A1A2E 0%,#2d1b1b 50%,#1A1A2E 100%);
      min-height:100vh;
    }
    .auth-card { background:white; border-radius:28px; box-shadow:0 24px 80px rgba(0,0,0,0.25); }
    .phone-flag {
      background:#F5F0E8; border:1.5px solid #E8DDD0; border-right:none;
      border-radius:10px 0 0 10px; padding:10px 14px; font-size:13px;
      font-weight:600; color:#5C5C6E; white-space:nowrap;
      display:flex; align-items:center; gap:6px;
    }
    .phone-input { border-radius:0 10px 10px 0 !important; border-left:none !important; }
    .toggle-pass {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:#8C7B6B;
      font-size:16px; padding:4px; transition:color 0.2s;
    }
    .toggle-pass:hover { color:#D62828; }

    /* Strength bar */
    .strength-bar { height:4px; border-radius:2px; transition:all 0.3s ease; }

    /* Step indicator */
    .step-dot {
      width:10px; height:10px; border-radius:50%;
      background:#E8DDD0; transition:all 0.3s ease;
    }
    .step-dot.active { background:#D62828; transform:scale(1.3); }
    .step-dot.done   { background:#2D7D46; }

    .orb { position:absolute; border-radius:50%; filter:blur(60px); opacity:0.12; animation:orbFloat 8s ease-in-out infinite; }
    .orb-1 { width:280px;height:280px;background:#D62828;top:-60px;right:-60px;animation-delay:0s; }
    .orb-2 { width:180px;height:180px;background:#E8A020;bottom:80px;left:-50px;animation-delay:4s; }
    @keyframes orbFloat {
      0%,100% { transform:translate(0,0) scale(1); }
      50%      { transform:translate(15px,-15px) scale(1.05); }
    }
  </style>
</head>
<body style="padding-top:0;">

  <div class="auth-bg relative flex items-center justify-center px-4 py-10 overflow-hidden">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="w-full max-w-lg relative z-10">

      <!-- Logo -->
      <a href="index.html" class="flex items-center justify-center gap-3 mb-8">
        <div class="w-11 h-11 rounded-2xl flex items-center justify-center text-white font-bold shadow-lg"
             style="background:linear-gradient(135deg,#D62828,#E8A020);">NG</div>
        <div>
          <div class="font-black text-white text-lg" style="font-family:'Syne',sans-serif;line-height:1.1;">NAMM GLOBAL</div>
          <div class="text-xs" style="color:rgba(255,255,255,0.5);">Import Chine · Afrique</div>
        </div>
      </a>

      <!-- Card -->
      <div class="auth-card p-8 lg:p-10">

        <div class="text-center mb-6">
          <h1 class="text-2xl font-black mb-1" style="font-family:'Syne',sans-serif;color:#1A1A2E;">Créer mon compte</h1>
          <p class="text-sm" style="color:#8C7B6B;">Rejoignez des centaines de clients qui importent depuis la Chine</p>
        </div>

        <!-- Message erreur / succès -->
        <div id="errorMsg" class="hidden mb-5 p-3 rounded-xl text-sm font-medium"
             style="background:#FEE2E2;color:#D62828;border:1px solid #FECACA;"></div>

        <form id="registerForm" class="space-y-4" novalidate>

          <!-- Nom complet -->
          <div>
            <label class="text-xs font-bold block mb-1.5" style="color:#5C5C6E;">Nom complet *</label>
            <input id="nameInput" class="input" placeholder="Prénom et Nom" required autocomplete="name">
          </div>

          <!-- Téléphone -->
          <div>
            <label class="text-xs font-bold block mb-1.5" style="color:#5C5C6E;">
              Numéro WhatsApp *
              <span class="font-normal ml-1" style="color:#8C7B6B;">(ce sera votre identifiant de connexion)</span>
            </label>
            <div class="flex">
              <div class="phone-flag">
                <span>🌍</span>
                <select id="countryCode"
                        class="bg-transparent border-none outline-none text-xs font-semibold cursor-pointer"
                        style="color:#5C5C6E;max-width:80px;">
                  <option value="+237">🇨🇲 +237</option>
                  <option value="+225">🇨🇮 +225</option>
                  <option value="+221">🇸🇳 +221</option>
                  <option value="+241">🇬🇦 +241</option>
                  <option value="+242">🇨🇬 +242</option>
                  <option value="+243">🇨🇩 +243</option>
                  <option value="+223">🇲🇱 +223</option>
                  <option value="+226">🇧🇫 +226</option>
                  <option value="+233">🇬🇭 +233</option>
                  <option value="+234">🇳🇬 +234</option>
                  <option value="+224">🇬🇳 +224</option>
                </select>
              </div>
              <input id="phoneInput" type="tel" class="input phone-input flex-1"
                     placeholder="XXX XXX XXX" autocomplete="tel" required>
            </div>
          </div>
          

          <!-- Email (optionnel) -->
          <div>
            <label class="text-xs font-bold block mb-1.5" style="color:#5C5C6E;">
              Email
              <span class="font-normal ml-1" style="color:#8C7B6B;">(optionnel – pour recevoir les devis)</span>
            </label>
            <input id="emailInput" type="email" class="input" placeholder="votre@email.com" autocomplete="email">
          </div>

          <!-- Pays / Ville -->
          <div class="grid sm:grid-cols-2 gap-4">
            <div>
              <label class="text-xs font-bold block mb-1.5" style="color:#5C5C6E;">Pays *</label>
              <select id="countryInput" class="input" required>
                <option value="">Sélectionnez</option>
                <option value="CM">Cameroun</option>
                <option value="CI">Côte d'Ivoire</option>
                <option value="SN">Sénégal</option>
                <option value="GA">Gabon</option>
                <option value="CG">Congo</option>
                <option value="CD">RDC</option>
                <option value="ML">Mali</option>
                <option value="BF">Burkina Faso</option>
                <option value="BJ">Bénin</option>
                <option value="TG">Togo</option>
                <option value="GH">Ghana</option>
                <option value="NG">Nigeria</option>
              </select>
            </div>
            <div>
              <label class="text-xs font-bold block mb-1.5" style="color:#5C5C6E;">Ville *</label>
              <input id="cityInput" class="input" placeholder="Votre ville" required>
            </div>
          </div>

          <!-- Mot de passe -->
          <div>
            <label class="text-xs font-bold block mb-1.5" style="color:#5C5C6E;">Mot de passe * <span class="font-normal" style="color:#8C7B6B;">(min. 8 car., 1 chiffre, 1 spécial)</span></label>
            <div class="relative">
              <input id="passwordInput" type="password" class="input w-full"
                     placeholder="Choisissez un mot de passe sécurisé"
                     autocomplete="new-password" required
                     style="padding-right:44px;"
                     oninput="checkStrength(this.value)">
              <button type="button" class="toggle-pass" id="togglePass1">👁️</button>
            </div>
            <!-- Barre de force -->
            <div class="mt-2">
              <div class="flex gap-1 mb-1">
                <div class="strength-bar flex-1" id="bar1" style="background:#E8DDD0;"></div>
                <div class="strength-bar flex-1" id="bar2" style="background:#E8DDD0;"></div>
                <div class="strength-bar flex-1" id="bar3" style="background:#E8DDD0;"></div>
                <div class="strength-bar flex-1" id="bar4" style="background:#E8DDD0;"></div>
              </div>
              <div id="strengthLabel" class="text-xs" style="color:#8C7B6B;">Saisissez un mot de passe</div>
            </div>
          </div>

          <!-- Confirmer mot de passe -->
          <div>
            <label class="text-xs font-bold block mb-1.5" style="color:#5C5C6E;">Confirmer le mot de passe *</label>
            <div class="relative">
              <input id="passwordConfirm" type="password" class="input w-full"
                     placeholder="Répétez votre mot de passe"
                     autocomplete="new-password" required
                     style="padding-right:44px;">
              <button type="button" class="toggle-pass" id="togglePass2">👁️</button>
            </div>
            <div id="matchLabel" class="text-xs mt-1" style="color:#8C7B6B;min-height:16px;"></div>
          </div>

          <!-- CGU -->
          <div class="flex items-start gap-3">
            <input type="checkbox" id="cguCheck" required class="mt-1 flex-shrink-0">
            <label for="cguCheck" class="text-xs" style="color:#8C7B6B;">
              En créant un compte, j'accepte les
              <a href="conditions-utilisation.html" target="_blank"
                 style="color:#D62828;font-weight:600;text-decoration:underline;"
                 onclick="event.stopPropagation();">
                conditions d'utilisation
              </a>
              de NAMM GLOBAL et consens à être contacté par WhatsApp, email ou SMS.
            </label>
          </div>

          <!-- Bouton -->
          <button type="submit" id="registerBtn"
                  class="btn-primary w-full justify-center"
                  style="padding:14px;font-size:15px;">
            🚀 Créer mon compte
          </button>

        </form>

        <div class="divider my-5"></div>

        <p class="text-center text-sm" style="color:#8C7B6B;">
          Déjà un compte ?
          <a href="login.html" class="font-bold" style="color:#D62828;">Se connecter →</a>
        </p>

      </div>

      <p class="text-center mt-6 text-sm">
        <a href="index.html" style="color:rgba(255,255,255,0.6);">← Retour à l'accueil</a>
      </p>
    </div>
  </div>

  <script type="Module" src="assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.AUTH.redirectIfLoggedIn('dashboard.html');
    });

    // ── Toggle passwords ─────────────────────────────────────
    ['togglePass1','togglePass2'].forEach((id, i) => {
      document.getElementById(id).addEventListener('click', function() {
        const input = document.getElementById(i === 0 ? 'passwordInput' : 'passwordConfirm');
        const show  = input.type === 'password';
        input.type      = show ? 'text' : 'password';
        this.textContent = show ? '🙈' : '👁️';
      });
    });

    // ── Force du mot de passe ────────────────────────────────
    function checkStrength(val) {
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/[0-9]/.test(val) || /[^a-zA-Z0-9]/.test(val)) score++;

      const colors  = ['#E8DDD0','#D62828','#E8A020','#3B82F6','#2D7D46'];
      const labels  = ['Saisissez un mot de passe','Trop faible','Faible','Moyen','Fort 💪'];
      const tColors = ['#8C7B6B','#D62828','#B45309','#1A5F8A','#2D7D46'];

      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById('bar' + i);
        bar.style.background = i <= score ? colors[score] : '#E8DDD0';
      }
      const lbl = document.getElementById('strengthLabel');
      lbl.textContent = labels[score];
      lbl.style.color  = tColors[score];

      // Vérifier correspondance en temps réel
      checkMatch();
    }

    function checkMatch() {
      const p1  = document.getElementById('passwordInput').value;
      const p2  = document.getElementById('passwordConfirm').value;
      const lbl = document.getElementById('matchLabel');
      if (!p2) { lbl.textContent = ''; return; }
      if (p1 === p2) {
        lbl.textContent = '✅ Les mots de passe correspondent';
        lbl.style.color = '#2D7D46';
      } else {
        lbl.textContent = '❌ Les mots de passe ne correspondent pas';
        lbl.style.color = '#D62828';
      }
    }

    document.getElementById('passwordConfirm').addEventListener('input', checkMatch);

    // ── Soumission ───────────────────────────────────────────
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const countrySelect = document.getElementById('countryCode').value;
      const phoneLocal    = document.getElementById('phoneInput').value.trim();
      const phone = countrySelect + window.AUTH.normalizePhone(phoneLocal);


      const data = {
        name:            document.getElementById('nameInput').value.trim(),
        phone:           phone,
        email:           document.getElementById('emailInput').value.trim(),
        country:         document.getElementById('countryInput').value,
        city:            document.getElementById('cityInput').value.trim(),
        password:        document.getElementById('passwordInput').value,
        passwordConfirm: document.getElementById('passwordConfirm').value,
      };

      // Validations côté client
      if (!data.name)    return showError('Le nom complet est requis.');
      if (!data.phone)   return showError('Le numéro WhatsApp est requis.');
      if (!data.country) return showError('Veuillez sélectionner votre pays.');
      if (!data.city)    return showError('La ville est requise.');
      if (!data.password) return showError('Le mot de passe est requis.');

      const btn  = document.getElementById('registerBtn');
      const orig = btn.innerHTML;
      btn.innerHTML = '⏳ Création du compte…';
      btn.disabled  = true;

      setTimeout(async() => {
        const result = await window.AUTH.registerUser(data);

        if (result.ok) {
          localStorage.setItem("accessToken", result.accessToken);
          localStorage.setItem("refreshToken", result.refreshToken);
          btn.innerHTML   = '✅ Compte créé !';
          btn.style.background = 'linear-gradient(135deg,#2D7D46,#1a5c32)';
          setTimeout(() => window.location.href = 'dashboard.html', 800);
        } else {
          showError(result.error);
          btn.innerHTML = orig;
          btn.disabled  = false;
        }
      }, 800);
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = '⚠️ ' + msg;
      el.classList.remove('hidden');
      el.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
  </script>
</body>
</html>
