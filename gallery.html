<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie – NAMM GLOBAL</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend({colors:{brand:{red:'#D62828',gold:'#E8A020',dark:'#1A1A2E'}}})}}</script>
</head>
<body>
  <div id="nav-container"></div>

  <div class="max-w-7xl mx-auto px-4 lg:px-8 py-8">

    <div class="text-center mb-10 reveal">
      <div class="section-tag mx-auto" style="width:fit-content;">🖼️ Preuves réelles</div>
      <h1 class="section-title">Galerie des livraisons</h1>
      <p class="section-sub mx-auto">Des centaines de clients satisfaits. Voyez leurs commandes, leurs délais et leurs témoignages.</p>
    </div>

    <div class="flex justify-center mb-8 reveal">
      <div class="filter-tabs">
        <button data-gfilter="all"   class="filter-tab active">🔍 Tous</button>
        <button data-gfilter="photo" class="filter-tab">📸 Photos</button>
        <button data-gfilter="video" class="filter-tab">🎥 Vidéos</button>
      </div>
    </div>

    <div id="galleryGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <footer class="mt-16 py-8 text-center text-xs" style="color:#8C7B6B;border-top:1px solid #E8DDD0;">
    © 2025 NAMM GLOBAL – Toutes les photos partagées avec accord des clients
  </footer>

  <script src="assets/js/mockdata.js"></script>
  <script type="module" src="assets/js/auth.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/gallery.js"></script>
</body>
</html>
